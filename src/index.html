<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alouette - 翻译与朗读工具</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="container">
        <header>
            <h1>Alouette - 翻译与朗读工具</h1>
            <p>Translation & Text-to-Speech Tool</p>
        </header>

        <main>
            <!-- Translation Input Section -->
            <div class="translation-section">
                <label for="sourceText">输入要翻译的文本 / Enter text to translate:</label>
                <textarea id="sourceText" placeholder="请输入要翻译的文本... / Please enter text to translate..."></textarea>
                
                <label>选择目标语言 / Select target languages:</label>
                <div class="language-checkboxes">
                    <label class="checkbox-item">
                        <input type="checkbox" value="en" checked>
                        <span>English</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="fr">
                        <span>French</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="es">
                        <span>Spanish</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="de">
                        <span>German</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="ja">
                        <span>Japanese</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="ru">
                        <span>Russian</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="hi">
                        <span>Hindi</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="ar">
                        <span>Arabic</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="ko">
                        <span>Korean</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" value="zh">
                        <span>Chinese</span>
                    </label>
                </div>

                <div class="translate-controls">
                    <button id="translateBtn" class="btn primary">🌐 开始翻译 / Start Translation</button>
                    <button id="saveBtn" class="btn secondary" disabled>💾 保存结果 / Save Results</button>
                </div>
            </div>

            <!-- Translation Results -->
            <div class="translation-results" id="translationResults" style="display: none;">
                <h3>翻译结果 / Translation Results</h3>
                <div id="translationContent"></div>
            </div>

            <!-- File Loading Section -->
            <div class="input-section">
                <label for="fileInput">或选择已翻译的文件 / Or choose translated file:</label>
                <input type="file" id="fileInput" accept=".txt,.md" />
                
                <label for="textInput">文本内容 / Text Content & Reading Display:</label>
                <div id="textInput" class="text-input-display" contenteditable="true" placeholder="请选择包含语言标签的文件，或直接输入文本... / Please choose a file with language tags or type text directly..."></div>
            </div>

            <div class="speed-section">
                <label for="speedRange">语速 / Speech Rate:</label>
                <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1">
                <span id="speedValue">1.0x</span>
            </div>

            <div class="pitch-section">
                <label for="pitchRange">音调 / Pitch:</label>
                <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1">
                <span id="pitchValue">1.0</span>
            </div>

            <div class="control-section">
                <button id="playBtn" class="btn primary">▶ 逐行播放 / Play Line by Line</button>
                <button id="pauseBtn" class="btn secondary">⏸ 暂停 / Pause</button>
                <button id="stopBtn" class="btn secondary">⏹ 停止 / Stop</button>
            </div>

            <div class="status-section">
                <div id="status" class="status">准备就绪 / Ready</div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
  </body>
</html>
