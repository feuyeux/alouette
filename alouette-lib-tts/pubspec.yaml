name: alouette_lib_tts
description: A Flutter library for text-to-speech functionality used across Alouette applications
version: 1.0.0
homepage: https://github.com/alouette/alouette-lib-tts

environment:
  sdk: '>=3.8.1 <4.0.0'
  flutter: ">=3.8.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  plugin:
    platforms:
      android:
        package: com.alouette.lib.tts
        pluginClass: AlouetteLibTtsPlugin
      ios:
        pluginClass: AlouetteLibTtsPlugin